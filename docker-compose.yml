services:
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d notifications" ]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: src/NotificationSystem.Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Api__Port: 8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=notifications;Username=postgres;Password=1234
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      GrpcEndpoints__TemplateServiceUrl: http://api:8080
      GrpcEndpoints__DeliveryServiceUrl: http://api:8080
      Seq: http://seq:80
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: src/NotificationSystem.Worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=notifications;Username=postgres;Password=1234
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      RabbitMq__VirtualHost: /
      GrpcEndpoints__TemplateServiceUrl: http://api:8080
      GrpcEndpoints__DeliveryServiceUrl: http://api:8080
      Seq: http://seq:80
